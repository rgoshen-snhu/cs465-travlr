<div class="card h-100">
  <div class="card-header">{{ trip.name }}</div>
  <img src="assets/images/{{trip.image}}" alt="trip thumbnail" class="card-img-top" />
  <div class="card-body d-flex flex-column">
    <h6 class="card-subtitle mb-2 text-muted">{{ trip.resort }}</h6>
    <p class="card-subtitle mb-2 text-muted">{{trip.length}} only {{trip.perPerson|currency:'USD':'symbol'}} per person
    </p>
    <p class="card-text" [innerHTML]="trip.description"></p>
    <div class="mt-auto">
      <div *ngIf="isLoggedIn()">
        <button class="btn btn-info" (click)="editTrip(trip)">Edit Trip</button>
        <!-- <button class="btn btn-danger" (click)="deleteTrip()">Delete</button> -->
      </div>
    </div>
  </div>
</div>
