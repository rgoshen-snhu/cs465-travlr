<div class="col-md-4">
    <h2 class="text-center">Add Trip</h2>

    <form *ngIf="addForm" [formGroup]="addForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label for="code">Code:</label>
            <input type="text" class="form-control" formControlName="code" placeholder="Code" [ngClass]="{'is-invalid': submitted && f['code'].errors}"/>
            <div *ngIf="submitted && f['code'].errors">
                <div *ngIf="f['code'].errors['required']">TripCode is required</div>
            </div>
        </div>
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" class="form-control" formControlName="name" placeholder="Name" [ngClass]="{'is-invalid': submitted && f['name'].errors}"/>
            <div *ngIf="submitted && f['name'].errors">
                <div *ngIf="f['name'].errors['required']">Trip Name is required</div>
            </div>
        </div>
        <div class="form-group">
            <label for="length">Length:</label>
            <input type="text" class="form-control" formControlName="length" placeholder="Length" [ngClass]="{'is-invalid': submitted && f['length'].errors}"/>
            <div *ngIf="submitted && f['length'].errors">
                <div *ngIf="f['length'].errors['required']">Trip Length is required</div>
            </div>
        </div>
        <div class="form-group">
            <label for="start">Start:</label>
            <input type="text" class="form-control" formControlName="start" placeholder="Start date" [ngClass]="{'is-invalid': submitted && f['start'].errors}"/>
            <div *ngIf="submitted && f['start'].errors">
                <div *ngIf="f['start'].errors['required']">Start date is required</div>
            </div>
        </div>
        <div class="form-group">
            <label for="resort">Resort:</label>
            <input type="text" class="form-control" formControlName="resort" placeholder="Resort" [ngClass]="{'is-invalid': submitted && f['resort'].errors}"/>
            <div *ngIf="submitted && f['resort'].errors">
                <div *ngIf="f['resort'].errors['required']">Resort is required</div>
            </div>
        </div>
        <div class="form-group">
            <label for="perPerson">Per Person:</label>
            <input type="text" class="form-control" formControlName="perPerson" placeholder="Per Person" [ngClass]="{'is-invalid': submitted && f['perPerson'].errors}"/>
            <div *ngIf="submitted && f['perPerson'].errors">
                <div *ngIf="f['perPerson'].errors['required']">Per Person price is required</div>
            </div>
        </div>
        <div class="form-group">
            <label for="image">Image:</label>
            <input type="text" class="form-control" formControlName="image" placeholder="Image filename" [ngClass]="{'is-invalid': submitted && f['image'].errors}"/>
            <div *ngIf="submitted && f['image'].errors">
                <div *ngIf="f['image'].errors['required']">Image is required</div>
            </div>
        </div>
        <div class="form-group">
            <label for="description">Description:</label>
            <textarea class="form-control" formControlName="description" placeholder="Description" [ngClass]="{'is-invalid': submitted && f['description'].errors}"></textarea>
            <div *ngIf="submitted && f['description'].errors">
                <div *ngIf="f['description'].errors['required']">Description is required</div>
            </div>
        </div>
        <button type="submit" class="btn btn-info">Save</button>
    </form>
</div>
